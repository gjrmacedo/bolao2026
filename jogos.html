<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos · Bolão Pistolando™ NAFTA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<style>
  :root {
    --verde: #00c853; --amarelo: #ffd600; --azul: #0d47a1;
    --laranja: #ff6d00; --vermelho: #d50000;
    --bg: #0a0a0a; --card: #141414; --border: #222; --text: #f0f0f0; --muted: #666;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; }

  header {
    background:linear-gradient(135deg,#0a2463 0%,#0d1b2a 60%,#0a0a0a 100%);
    border-bottom:3px solid var(--amarelo);
    padding:1.5rem 2rem; position:sticky; top:0; z-index:100;
  }
  .header-inner { max-width:1100px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
  .logo-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--amarelo); letter-spacing:.05em; }
  .logo-sub { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; display:block; }
  nav { display:flex; gap:.5rem; flex-wrap:wrap; }
  nav a {
    text-decoration:none; font-family:'IBM Plex Mono',monospace; font-size:.75rem; font-weight:600;
    letter-spacing:.1em; text-transform:uppercase; padding:.5rem 1rem; border:1px solid var(--border);
    color:var(--muted); transition:all .15s;
  }
  nav a:hover, nav a.active { border-color:var(--amarelo); color:var(--amarelo); background:rgba(255,214,0,.06); }

  main { max-width:1100px; margin:0 auto; padding:2rem; }

  .fase-title {
    font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.05em;
    color:var(--amarelo); margin:2.5rem 0 1rem; display:flex; align-items:center; gap:.75rem;
  }
  .fase-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .grupo-label {
    font-family:'IBM Plex Mono',monospace; font-size:.7rem; letter-spacing:.12em;
    color:var(--muted); text-transform:uppercase; margin:.75rem 0 .5rem;
  }

  .jogos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:.75rem; }

  .jogo-card {
    background:var(--card); border:1px solid var(--border); padding:1rem 1.25rem;
    position:relative; overflow:hidden; transition:border-color .15s;
  }
  .jogo-card:hover { border-color:#333; }
  .jogo-card.tem-resultado { border-left:3px solid var(--verde); }
  .jogo-card.duplicado { border-left:3px solid var(--amarelo); }
  .jogo-card.pot-duplicado { border-left:3px solid var(--laranja); }

  .duplo-badge {
    position:absolute; top:.5rem; right:.75rem;
    font-family:'Bebas Neue',sans-serif; font-size:1.1rem;
  }
  .duplo-badge.d { color:var(--amarelo); }
  .duplo-badge.p { color:var(--laranja); opacity:.8; }

  .jogo-meta { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.5rem; }
  .jogo-times { display:flex; align-items:center; gap:.5rem; font-weight:700; font-size:.9rem; margin-bottom:.25rem; }
  .jogo-vs { font-family:'IBM Plex Mono',monospace; font-size:.7rem; color:var(--muted); flex-shrink:0; }
  .jogo-resultado { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:.05em; color:var(--amarelo); }
  .jogo-sede { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--muted); margin-top:.25rem; }
  .jogo-pen { font-size:.7rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; }

  .filtro-bar { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
  .filtro-btn {
    font-family:'IBM Plex Mono',monospace; font-size:.7rem; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; padding:.4rem .9rem; border:1px solid var(--border); background:transparent;
    color:var(--muted); cursor:pointer; transition:all .15s;
  }
  .filtro-btn:hover, .filtro-btn.active { border-color:var(--amarelo); color:var(--amarelo); background:rgba(255,214,0,.06); }

  .loader { display:flex; align-items:center; justify-content:center; padding:4rem; gap:1rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
  .spinner { width:20px;height:20px; border:2px solid var(--border); border-top-color:var(--amarelo); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }

  footer { text-align:center; padding:2rem; color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:.7rem; border-top:1px solid var(--border); margin-top:3rem; }

  .fi { vertical-align: middle; border-radius: 2px; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }

  @media(max-width:600px) { header{padding:1rem;} main{padding:1rem;} .logo-title{font-size:1.6rem;} }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-title">⚽ Bolão Pistolando™</span>
      <span class="logo-sub">NAFTA Edition 2026 · Soccer Fofo</span>
    </div>
    <nav>
      <a href="index.html">Ranking</a>
      <a href="jogos.html" class="active">Jogos</a>
      <a href="extras.html">Bônus</a>
      <a href="palpitar.html">Palpitar</a>
      <a href="regulamento.html">Regulamento</a>
    </nav>
  </div>
</header>

<main>
  <div id="app">
    <div class="loader"><div class="spinner"></div> Carregando jogos...</div>
  </div>
</main>

<footer>Bolão Pistolando™ NAFTA Edition 2026</footer>

<script src="engine.js"></script>
<script>
// Bandeiras — definido localmente, não depende de cache do engine.js
const FLAGS = {
  'México':'mx','África do Sul':'za','Coreia do Sul':'kr','Tchéquia':'cz',
  'Canadá':'ca','Bósnia-Herz.':'ba','Estados Unidos':'us','Paraguai':'py',
  'Austrália':'au','Turquia':'tr','Catar':'qa','Suíça':'ch','Brasil':'br',
  'Marrocos':'ma','Haiti':'ht','Escócia':'gb-sct','Alemanha':'de','Curaçao':'cw',
  'Países Baixos':'nl','Japão':'jp','Costa do Marfim':'ci','Equador':'ec',
  'Suécia':'se','Tunísia':'tn','Espanha':'es','Cabo Verde':'cv','Bélgica':'be',
  'Egito':'eg','Arábia Saudita':'sa','Uruguai':'uy','Irã':'ir',
  'Nova Zelândia':'nz','França':'fr','Senegal':'sn','Iraque':'iq','Noruega':'no',
  'Argentina':'ar','Argélia':'dz','Áustria':'at','Jordânia':'jo','Portugal':'pt',
  'RD Congo':'cd','Inglaterra':'gb-eng','Croácia':'hr','Gana':'gh',
  'Panamá':'pa','Uzbequistão':'uz','Colômbia':'co',
};
function flagTeam(nome) {
  if (!nome) return '';
  const code = FLAGS[nome];
  return code ? `<span class="fi fi-${code}"></span> ${nome}` : nome;
}

const FASE_LABELS = {
  grupos:'Fase de Grupos', '16avos':'16avos de Final', oitavas:'Oitavas de Final',
  quartas:'Quartas de Final', semi:'Semifinal', terceiro:'3º Lugar', final:'Final'
};
const ANFITRIOES = ['Estados Unidos','Canadá','México'];

let todosJogos = [], todosResultados = {}, anfitriaoBest = null;
let filtroAtivo = 'todos';

// Times efetivos: no mata-mata os nomes reais vêm do resultado quando preenchidos
function timesDoJogo(jogo) {
  const res = todosResultados[String(jogo.id)];
  return {
    casa: (res && res.casa) || jogo.casa,
    fora: (res && res.fora) || jogo.fora,
  };
}

function isPotDuplo(jogo) {
  const { casa, fora } = timesDoJogo(jogo);
  return ANFITRIOES.includes(casa) || ANFITRIOES.includes(fora);
}

// Fator real de dobra (2× ou 4×) usando a lógica do motor
function fatorJogo(jogo) {
  const res = todosResultados[String(jogo.id)];
  return window.BolaoEngine.fatorDuplicacao(jogo, res, anfitriaoBest);
}

function renderJogos() {
  const app = document.getElementById('app');
  const ft = flagTeam;
  let html = '';

  // Filtros
  html += `<div class="filtro-bar">
    <button class="filtro-btn ${filtroAtivo==='todos'?'active':''}" onclick="setFiltro('todos')">Todos</button>
    <button class="filtro-btn ${filtroAtivo==='proximos'?'active':''}" onclick="setFiltro('proximos')">Próximos</button>
    <button class="filtro-btn ${filtroAtivo==='encerrados'?'active':''}" onclick="setFiltro('encerrados')">Encerrados</button>
    <button class="filtro-btn ${filtroAtivo==='brasil'?'active':''}" onclick="setFiltro('brasil')">🇧🇷 Brasil</button>
    <button class="filtro-btn ${filtroAtivo==='argentina'?'active':''}" onclick="setFiltro('argentina')">🇦🇷 Argentina</button>
    <button class="filtro-btn ${filtroAtivo==='duplos'?'active':''}" onclick="setFiltro('duplos')">⚡ Duplos</button>
  </div>`;

  const agora = Date.now();
  let jogos = todosJogos.filter(j => {
    const res = todosResultados[String(j.id)];
    const temRes = res && res.gols_casa !== null && res.gols_casa !== undefined;
    const tj = timesDoJogo(j);
    if (filtroAtivo === 'proximos') return !temRes;
    if (filtroAtivo === 'encerrados') return temRes;
    if (filtroAtivo === 'brasil') return tj.casa === 'Brasil' || tj.fora === 'Brasil';
    if (filtroAtivo === 'argentina') return tj.casa === 'Argentina' || tj.fora === 'Argentina';
    if (filtroAtivo === 'duplos') return fatorJogo(j) > 1 || isPotDuplo(j);
    return true;
  });

  // Agrupa por fase
  const porFase = {};
  jogos.forEach(j => {
    if (!porFase[j.fase]) porFase[j.fase] = {};
    const grupo = j.grupo || '_';
    if (!porFase[j.fase][grupo]) porFase[j.fase][grupo] = [];
    porFase[j.fase][grupo].push(j);
  });

  const ordemFases = ['grupos','16avos','oitavas','quartas','semi','terceiro','final'];

  ordemFases.forEach(fase => {
    if (!porFase[fase]) return;
    html += `<div class="fase-title">${FASE_LABELS[fase]}</div>`;

    const grupos = Object.keys(porFase[fase]).sort();
    grupos.forEach(g => {
      if (g !== '_') html += `<div class="grupo-label">Grupo ${g}</div>`;
      html += `<div class="jogos-grid">`;
      porFase[fase][g].forEach(jogo => {
        const res = todosResultados[String(jogo.id)];
        const temRes = res && res.gols_casa !== null && res.gols_casa !== undefined;
        const { casa, fora } = timesDoJogo(jogo);
        const fator = fatorJogo(jogo);
        const potD = fator === 1 && isPotDuplo(jogo);
        const cardClass = [
          temRes ? 'tem-resultado' : '',
          fator > 1 ? 'duplicado' : potD ? 'pot-duplicado' : '',
        ].filter(Boolean).join(' ');

        const dataFmt = new Date(jogo.data).toLocaleString('pt-BR', {
          weekday:'short', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'
        });

        html += `<div class="jogo-card ${cardClass}">`;
        if (fator > 1) html += `<span class="duplo-badge d">${fator}×</span>`;
        else if (potD) html += `<span class="duplo-badge p">2×?</span>`;
        html += `<div class="jogo-meta">#${jogo.id} · ${dataFmt}</div>`;
        html += `<div class="jogo-times"><span>${ft(casa)}</span><span class="jogo-vs">×</span><span>${ft(fora)}</span></div>`;
        if (temRes) {
          html += `<div class="jogo-resultado">${res.gols_casa} – ${res.gols_fora}</div>`;
          if (res.penaltis_vencedor) html += `<div class="jogo-pen">Pênaltis: ${res.penaltis_vencedor}</div>`;
        }
        html += `<div class="jogo-sede">📍 ${jogo.sede}</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    });
  });

  if (jogos.length === 0) {
    html += `<p style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.85rem;padding:2rem 0">Nenhum jogo encontrado para este filtro.</p>`;
  }

  app.innerHTML = html;
}

function setFiltro(f) {
  filtroAtivo = f;
  renderJogos();
}

async function init() {
  const app = document.getElementById('app');
  try {
    const [dados, resultadosData] = await Promise.all([
      window.BolaoEngine.fetchJSON('data/jogos.json'),
      window.BolaoEngine.fetchJSON('data/resultados.json'),
    ]);
    todosJogos = dados.jogos;
    todosResultados = resultadosData.resultados || {};
    anfitriaoBest = resultadosData._anfitriao_melhor_campanha || null;
    renderJogos();
  } catch(err) {
    app.innerHTML = `<div style="background:rgba(213,0,0,.1);border:1px solid rgba(213,0,0,.3);padding:1.5rem;color:#ff6b6b;font-family:'IBM Plex Mono',monospace;font-size:.85rem">${err.message}</div>`;
  }
}
init();
</script>
</body>
</html>
