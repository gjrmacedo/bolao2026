<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Pistolando™ NAFTA 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
<style>
  :root {
    --verde: #00c853;
    --amarelo: #ffd600;
    --azul: #0d47a1;
    --laranja: #ff6d00;
    --vermelho: #d50000;
    --bg: #0a0a0a;
    --card: #141414;
    --border: #222;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a2463 0%, #0d1b2a 60%, #0a0a0a 100%);
    border-bottom: 3px solid var(--amarelo);
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--amarelo);
    letter-spacing: 0.05em;
  }

  .logo-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  nav { display: flex; gap: 0.5rem; flex-wrap: wrap; }

  nav a {
    text-decoration: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.15s;
  }

  nav a:hover, nav a.active {
    border-color: var(--amarelo);
    color: var(--amarelo);
    background: rgba(255,214,0,0.06);
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* RANKING TABLE */
  .ranking-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }

  thead th {
    background: #111;
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: #181818; }

  tbody td {
    padding: 0.9rem 1rem;
    white-space: nowrap;
  }

  .pos { color: var(--muted); width: 3rem; }
  .pos-1 { color: #FFD700; font-weight: 700; }
  .pos-2 { color: #C0C0C0; font-weight: 700; }
  .pos-3 { color: #CD7F32; font-weight: 700; }

  .nome-cell { font-family: 'IBM Plex Sans', sans-serif; font-weight: 700; }

  .pts-cell {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--verde);
    text-align: right;
  }

  .pts-cell.negative { color: var(--vermelho); }

  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    font-size: 0.7rem;
    border-radius: 2px;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
  }

  .badge-cravada { background: rgba(0,200,83,0.15); color: var(--verde); border: 1px solid rgba(0,200,83,0.3); }
  .badge-invertida { background: rgba(213,0,0,0.15); color: var(--vermelho); border: 1px solid rgba(213,0,0,0.3); }

  /* JOGOS CARDS */
  .jogos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
    margin-bottom: 3rem;
  }

  .jogo-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 1rem 1.25rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .jogo-card:hover {
    border-color: #444;
    background: #181818;
  }

  .jogo-card.duplicado::before {
    content: '2×';
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--amarelo);
  }

  .jogo-card.pot-duplicado::before {
    content: '2×?';
    position: absolute;
    top: 0.5rem;
    right: 0.75rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--laranja);
    opacity: 0.8;
  }

  .jogo-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .jogo-times {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.35rem;
  }

  .jogo-vs {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .jogo-resultado {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    color: var(--amarelo);
    margin-top: 0.25rem;
  }

  .jogo-sede {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }

  .jogo-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: #444;
    margin-top: 0.4rem;
    letter-spacing: 0.08em;
  }

  /* LOADER */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    gap: 1rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--amarelo);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(213,0,0,0.1);
    border: 1px solid rgba(213,0,0,0.3);
    padding: 1.5rem;
    color: #ff6b6b;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }

  .tag-duplo { color: var(--amarelo); font-weight: 700; }
  .tag-pot   { color: var(--laranja); font-weight: 700; }

  /* Bandeiras flag-icons */
  .fi { vertical-align: middle; border-radius: 2px; box-shadow: 0 0 0 1px rgba(255,255,255,0.1); }

  /* MODAL */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 1rem;
  }

  #modal-card {
    background: var(--card);
    border: 1px solid #333;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.4rem;
    line-height: 1;
    padding: 0.25rem 0.5rem;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-header {
    padding: 1.25rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-jogo-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .modal-jogo-times {
    font-size: 1.05rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.25rem;
  }

  .modal-vs {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .modal-resultado {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    color: var(--amarelo);
    letter-spacing: 0.05em;
    margin-top: 0.15rem;
  }

  .modal-sede {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  .modal-aviso {
    padding: 1.25rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .modal-palpites { padding: 0.25rem 0; }

  .modal-palpite-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .modal-palpite-row:last-child { border-bottom: none; }

  .modal-nome {
    flex: 1;
    font-weight: 700;
    font-size: 0.9rem;
    min-width: 0;
  }

  .modal-bet {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 600;
    white-space: nowrap;
  }

  .modal-pts {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .pts-pos { color: var(--verde); }
  .pts-neg { color: var(--vermelho); }
  .pts-zero { color: var(--muted); }

  .modal-tipo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    padding: 0.1rem 0.4rem;
    border-radius: 2px;
    white-space: nowrap;
  }
  .tipo-cravada, .tipo-empate_cravado { background: rgba(0,200,83,0.15); color: var(--verde); border: 1px solid rgba(0,200,83,0.3); }
  .tipo-cravada_invertida { background: rgba(213,0,0,0.15); color: var(--vermelho); border: 1px solid rgba(213,0,0,0.3); }
  .tipo-vencedor { background: rgba(30,80,180,0.25); color: #90caf9; border: 1px solid rgba(30,80,180,0.4); }
  .tipo-gols_parcial, .tipo-empate_gols { background: rgba(255,214,0,0.1); color: var(--amarelo); border: 1px solid rgba(255,214,0,0.25); }
  .tipo-erro { color: var(--muted); }

  .modal-sem-palpite {
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  @media (max-width: 600px) {
    header { padding: 1rem; }
    main { padding: 1rem; }
    .logo-title { font-size: 1.6rem; }
    .pts-cell { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-title">⚽ Bolão Pistolando™</span>
      <span class="logo-sub">NAFTA Edition 2026 · Soccer Fofo</span>
    </div>
    <nav>
      <a href="index.html" class="active">Ranking</a>
      <a href="jogos.html">Jogos</a>
      <a href="extras.html">Bônus</a>
      <a href="palpitar.html">Palpitar</a>
      <a href="regulamento.html">Regulamento</a>
    </nav>
  </div>
</header>

<main>
  <div id="app">
    <div class="loader">
      <div class="spinner"></div>
      Carregando ranking...
    </div>
  </div>
</main>

<footer>
  Bolão Pistolando™ NAFTA Edition 2026 · Dados atualizados ao vivo do repositório
</footer>

<!-- Modal de palpites -->
<div id="modal-overlay" onclick="if(event.target===this)fecharModal()">
  <div id="modal-card">
    <button class="modal-close" onclick="fecharModal()">&#x2715;</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="engine.js"></script>
<script>
// Bandeiras — definido localmente, não depende de cache do engine.js
const FLAGS = {
  'México':'mx','África do Sul':'za','Coreia do Sul':'kr','Tchéquia':'cz',
  'Canadá':'ca','Bósnia-Herz.':'ba','Estados Unidos':'us','Paraguai':'py',
  'Austrália':'au','Turquia':'tr','Catar':'qa','Suíça':'ch','Brasil':'br',
  'Marrocos':'ma','Haiti':'ht','Escócia':'gb-sct','Alemanha':'de','Curaçao':'cw',
  'Países Baixos':'nl','Japão':'jp','Costa do Marfim':'ci','Equador':'ec',
  'Suécia':'se','Tunísia':'tn','Espanha':'es','Cabo Verde':'cv','Bélgica':'be',
  'Egito':'eg','Arábia Saudita':'sa','Uruguai':'uy','Irã':'ir',
  'Nova Zelândia':'nz','França':'fr','Senegal':'sn','Iraque':'iq','Noruega':'no',
  'Argentina':'ar','Argélia':'dz','Áustria':'at','Jordânia':'jo','Portugal':'pt',
  'RD Congo':'cd','Inglaterra':'gb-eng','Croácia':'hr','Gana':'gh',
  'Panamá':'pa','Uzbequistão':'uz','Colômbia':'co',
};
function flagTeam(nome) {
  if (!nome) return '';
  const code = FLAGS[nome];
  return code ? `<span class="fi fi-${code}"></span> ${nome}` : nome;
}

// Estado global
let allRanking = [], allParticipantes = [], allJogos = [], allResultados = {}, allAnfitriaoBest = null;

// Times efetivos: no mata-mata os nomes reais vêm do resultado quando preenchidos
function timesDoJogo(jogo) {
  const res = allResultados[String(jogo.id)];
  return {
    casa: (res && res.casa) || jogo.casa,
    fora: (res && res.fora) || jogo.fora,
  };
}
function fatorJogo(jogo) {
  return window.BolaoEngine.fatorDuplicacao(jogo, allResultados[String(jogo.id)], allAnfitriaoBest);
}

// Início da Copa = horário do primeiro jogo (México × África do Sul)
function inicioCopa() {
  if (!Array.isArray(allJogos) || allJogos.length === 0) return Infinity;
  return Math.min(...allJogos.map(j => new Date(j.data).getTime()));
}

function palpitesVisiveis(jogo) {
  const idStr = String(jogo.id);
  const agora = Date.now();
  // Trava global: nada visível antes do primeiro jogo da Copa (anti-cópia)
  if (agora < inicioCopa()) return false;
  const jogoTime = new Date(jogo.data).getTime();
  if (agora >= jogoTime - 600000) return true;
  if (!Array.isArray(allParticipantes) || allParticipantes.length === 0) return false;
  return allParticipantes.every(p => p.palpites?.[idStr] !== undefined);
}

const TIPO_LABEL = {
  cravada: 'cravada', empate_cravado: 'cravada',
  cravada_invertida: 'invertida',
  vencedor: 'vencedor',
  gols_parcial: 'gols', empate_gols: 'gols',
  erro: 'erro',
};

function abrirPalpites(jogoId) {
  const jogo = allJogos.find(j => j.id === jogoId);
  if (!jogo) return;
  const idStr = String(jogoId);
  const res = allResultados[idStr];
  const temRes = res && res.gols_casa !== null && res.gols_casa !== undefined;
  const visivel = palpitesVisiveis(jogo);

  const dataFmt = new Date(jogo.data).toLocaleString('pt-BR', {
    weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
  });

  const { casa, fora } = timesDoJogo(jogo);
  let html = `<div class="modal-header">
    <div class="modal-jogo-meta">${jogo.grupo ? 'Grupo ' + jogo.grupo : jogo.fase} · #${jogo.id} · ${dataFmt}</div>
    <div class="modal-jogo-times">
      <span>${flagTeam(casa)}</span>
      <span class="modal-vs">×</span>
      <span>${flagTeam(fora)}</span>
    </div>
    ${temRes ? `<div class="modal-resultado">${res.gols_casa} – ${res.gols_fora}${res.penaltis_vencedor ? ' <small style="font-size:.8rem;color:var(--muted)">(pen: ' + res.penaltis_vencedor + ')</small>' : ''}</div>` : ''}
    <div class="modal-sede">📍 ${jogo.sede}</div>
  </div>`;

  if (!visivel) {
    const agora = Date.now();
    const ini = inicioCopa();
    if (agora < ini) {
      const dataIni = new Date(ini).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      html += `<div class="modal-aviso">🔒 Os palpites de <strong>todos</strong> ficam ocultos até o início da Copa<br>(${dataIni} — México × África do Sul).<br><br>É pra garantir a lisura: ninguém copia de ninguém antes da bola rolar.</div>`;
    } else {
      const jogoTime = new Date(jogo.data).getTime();
      const faltam = jogoTime - Date.now() - 600000;
      const h = Math.floor(faltam / 3600000);
      const m = Math.floor((faltam % 3600000) / 60000);
      const tempoStr = h >= 24 ? `${Math.floor(h/24)}d ${h%24}h` : h > 0 ? `${h}h ${m}min` : `${m}min`;
      html += `<div class="modal-aviso">🔒 Palpites revelados 10min antes do início ou quando todos enviarem.<br><br><span style="font-size:.7rem">Disponíveis em: ${tempoStr}</span></div>`;
    }
  } else {
    html += `<div class="modal-palpites">`;
    allParticipantes.forEach(p => {
      const palpite = p.palpites?.[idStr];
      const detalhe = allRanking.find(r => r.nome === p.nome)?.detalheJogos?.[idStr];
      html += `<div class="modal-palpite-row"><span class="modal-nome">${p.nome}</span>`;
      if (palpite !== undefined) {
        html += `<span class="modal-bet">${palpite.gols_casa} – ${palpite.gols_fora}</span>`;
        if (detalhe) {
          const ptsClass = detalhe.pts > 0 ? 'pts-pos' : detalhe.pts < 0 ? 'pts-neg' : 'pts-zero';
          const label = TIPO_LABEL[detalhe.tipo] || '';
          html += `<span class="modal-pts ${ptsClass}">${detalhe.pts > 0 ? '+' : ''}${detalhe.pts.toFixed(1)}</span>`;
          if (label) html += `<span class="modal-tipo tipo-${detalhe.tipo}">${label}</span>`;
        }
      } else {
        html += `<span class="modal-sem-palpite">—</span>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function fecharModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });

async function render() {
  const app = document.getElementById('app');
  try {
    // Guard: reutiliza dados já carregados se existirem (evita múltiplos fetches)
    let ranking, jogos, resultados, anfitriaoBest, participantes;
    
    if (window.allJogos && window.allResultados !== undefined && window.allRanking && window.allParticipantes !== undefined) {
      // Dados já foram carregados
      ranking = window.allRanking;
      jogos = window.allJogos;
      resultados = window.allResultados;
      anfitriaoBest = window.allAnfitriaoBest || null;
      participantes = window.allParticipantes;
    } else {
      // Primeiro carregamento
      const data = await window.BolaoEngine.calcularRanking();
      ranking = data.ranking;
      jogos = data.jogos;
      resultados = data.resultados;
      anfitriaoBest = data.anfitriaoBest || null;
      participantes = data.participantes;
    }

    allRanking = ranking;
    allParticipantes = Array.isArray(participantes) ? participantes : [];
    allJogos = jogos;
    allResultados = resultados;
    allAnfitriaoBest = anfitriaoBest || null;

    // Próximos jogos (sem resultado, ordenados por data) — até 4
    const agora = Date.now();
    const proximos = jogos
      .filter(j => {
        const r = resultados[String(j.id)];
        return !r || (r.gols_casa === null || r.gols_casa === undefined);
      })
      .filter(j => new Date(j.data).getTime() > agora - 7200000)
      .sort((a, b) => new Date(a.data) - new Date(b.data))
      .slice(0, 4);

    // Últimos resultados — até 4
    const ultimosIds = Object.keys(resultados)
      .filter(id => {
        const r = resultados[id];
        return r && r.gols_casa !== null && r.gols_casa !== undefined;
      })
      .map(Number)
      .sort((a, b) => {
        const ja = jogos.find(j => j.id === a);
        const jb = jogos.find(j => j.id === b);
        return new Date(jb?.data) - new Date(ja?.data);
      })
      .slice(0, 4);

    let html = '';

    // --- AVISO DE TRAVA DE PALPITES (antes do início da Copa) ---
    const iniCopa = jogos.length ? Math.min(...jogos.map(j => new Date(j.data).getTime())) : Infinity;
    if (Date.now() < iniCopa) {
      const dataIni = new Date(iniCopa).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      html += `<div style="background:rgba(255,214,0,.06);border:1px solid rgba(255,214,0,.3);padding:1rem 1.25rem;margin-bottom:1.5rem;font-family:'IBM Plex Mono',monospace;font-size:.8rem;line-height:1.7;color:var(--text)">
        🔒 <strong style="color:var(--amarelo)">Palpites ocultos até o início da Copa</strong> (${dataIni}).<br>
        Ninguém vê o palpite de ninguém — nem nos jogos, nem nos bônus — até a bola rolar em México × África do Sul. É pra garantir a lisura da disputa.
      </div>`;
    }

    // --- RANKING ---
    html += `<h2 class="section-title">🏆 Classificação</h2>`;

    if (ranking.length === 0) {
      html += `<div class="error-box">Nenhum palpite encontrado. Adicione arquivos em data/palpites/ e atualize o index.json.</div>`;
    } else {
      html += `<div class="ranking-wrap"><table>
        <thead>
          <tr>
            <th>#</th>
            <th>Participante</th>
            <th style="text-align:right">Pontos</th>
            <th>⭐ Cravadas</th>
            <th>✓ Vencedor</th>
            <th>½ Gols</th>
            <th>💀 Invertidas</th>
            <th>Bônus</th>
          </tr>
        </thead>
        <tbody>`;

      ranking.forEach((p, i) => {
        const pos = i + 1;
        const posClass = pos <= 3 ? `pos-${pos}` : '';
        const ptsClass = p.pts < 0 ? 'negative' : '';
        html += `<tr>
          <td class="pos ${posClass}">${pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos}</td>
          <td class="nome-cell">${p.nome}</td>
          <td class="pts-cell ${ptsClass}">${p.pts.toFixed(1)}</td>
          <td><span class="badge badge-cravada">${p.cravadas}</span></td>
          <td>${p.acertosVencedor}</td>
          <td>${p.acertosGols}</td>
          <td>${p.invertidas > 0 ? `<span class="badge badge-invertida">${p.invertidas}</span>` : '—'}</td>
          <td>${p.ptsExtras > 0 ? `+${p.ptsExtras}` : '—'}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
    }

    // --- ÚLTIMOS RESULTADOS ---
    if (ultimosIds.length > 0) {
      html += `<h2 class="section-title" style="margin-top:3rem">📋 Últimos Resultados</h2>`;
      html += `<div class="jogos-grid">`;
      ultimosIds.forEach(id => {
        const jogo = jogos.find(j => j.id === id);
        const res = resultados[String(id)];
        if (!jogo || !res) return;
        const { casa, fora } = timesDoJogo(jogo);
        const dupClass = fatorJogo(jogo) > 1 ? 'duplicado' : '';
        const dataFmt = new Date(jogo.data).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        html += `<div class="jogo-card ${dupClass}" onclick="abrirPalpites(${id})">
          <div class="jogo-meta">${jogo.grupo ? 'Grupo ' + jogo.grupo : jogo.fase.toUpperCase()} · ${dataFmt}</div>
          <div class="jogo-times">
            <span>${flagTeam(casa)}</span>
            <span class="jogo-vs">×</span>
            <span>${flagTeam(fora)}</span>
          </div>
          <div class="jogo-resultado">${res.gols_casa} – ${res.gols_fora}${res.penaltis_vencedor ? ' <small style="font-size:0.9rem;color:var(--muted)">(pen: '+res.penaltis_vencedor+')</small>' : ''}</div>
          <div class="jogo-sede">📍 ${jogo.sede}</div>
          <div class="jogo-hint">clique para ver palpites</div>
        </div>`;
      });
      html += `</div>`;
    }

    // --- PRÓXIMOS JOGOS ---
    if (proximos.length > 0) {
      html += `<h2 class="section-title">🗓️ Próximos Jogos</h2>`;
      html += `<p style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);margin-bottom:1rem;">
        <span class="tag-duplo">2×</span> = Pontuação dupla &nbsp;&nbsp; <span class="tag-pot">2×?</span> = Potencialmente duplo (anfitrião)
      </p>`;
      html += `<div class="jogos-grid">`;
      proximos.forEach(jogo => {
        const { casa, fora } = timesDoJogo(jogo);
        const anfitrioes = ['Estados Unidos','Canadá','México'];
        const anfClass = anfitrioes.includes(casa) || anfitrioes.includes(fora) ? 'pot-duplicado' : '';
        const dupClass = fatorJogo(jogo) > 1 ? 'duplicado' : anfClass;
        const dataFmt = new Date(jogo.data).toLocaleString('pt-BR', { weekday:'short', day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        html += `<div class="jogo-card ${dupClass}" onclick="abrirPalpites(${jogo.id})">
          <div class="jogo-meta">${jogo.grupo ? 'Grupo '+jogo.grupo : jogo.fase} · ${dataFmt}</div>
          <div class="jogo-times">
            <span>${flagTeam(casa)}</span>
            <span class="jogo-vs">×</span>
            <span>${flagTeam(fora)}</span>
          </div>
          <div class="jogo-sede">📍 ${jogo.sede}</div>
          <div class="jogo-hint">clique para ver palpites</div>
        </div>`;
      });
      html += `</div>`;
    }

    app.innerHTML = html;

    // Compartilha dados com outras páginas (jogos.html pode reusar)
    window.allJogos = jogos;
    window.allResultados = resultados;
    window.allAnfitriaoBest = anfitriaoBest || null;
    window.allRanking = ranking;
    window.allParticipantes = participantes;

  } catch (err) {
    app.innerHTML = `<div class="error-box">
      <strong>Erro ao carregar dados</strong><br><br>
      ${err.message}<br><br>
      Verifique se o REPO_RAW em engine.js está configurado corretamente com seu usuário e repositório do GitHub.
    </div>`;
  }
}

render();
</script>
</body>
</html>
